<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Estudio de desarrollo de software acelerado por IA en Barcelona. Construimos tu producto digital en semanas, no en meses. Desde 1.500€." />
    <meta property="og:title" content="Think Better | Desarrollo de Software Acelerado por IA" />
    <meta property="og:description" content="3 ingenieros senior + IA = tu producto digital en semanas. Estudio de desarrollo en Barcelona." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://servicios-productos-online-ignasi.vercel.app/" />

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>Think Better | Desarrollo de Software Acelerado por IA</title>

    <!-- JSON-LD Structured Data: Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Think Better",
      "legalName": "Servicios & Productos Online",
      "url": "https://servicios-productos-online-ignasi.vercel.app/",
      "logo": "https://servicios-productos-online-ignasi.vercel.app/favicon.svg",
      "description": "Estudio de desarrollo de software acelerado por IA en Barcelona. Construimos tu producto digital en semanas, no en meses. React, Supabase, TypeScript.",
      "address": {
        "@type": "PostalAddress",
        "addressLocality": "Barcelona",
        "addressRegion": "Cataluña",
        "addressCountry": "ES"
      },
      "contactPoint": {
        "@type": "ContactPoint",
        "contactType": "customer service",
        "availableLanguage": ["Spanish", "Catalan", "English"]
      },
      "hasOfferCatalog": {
        "@type": "OfferCatalog",
        "name": "Servicios de desarrollo de software",
        "itemListElement": [
          {
            "@type": "Offer",
            "itemOffered": {
              "@type": "Service",
              "name": "Plan Launch",
              "description": "Landing page o web corporativa con hasta 5 secciones"
            },
            "price": "1500",
            "priceCurrency": "EUR"
          },
          {
            "@type": "Offer",
            "itemOffered": {
              "@type": "Service",
              "name": "Plan Build",
              "description": "Aplicación web o SaaS con autenticación, base de datos y panel de control"
            },
            "price": "4500",
            "priceCurrency": "EUR"
          },
          {
            "@type": "Offer",
            "itemOffered": {
              "@type": "Service",
              "name": "Plan Scale",
              "description": "SaaS avanzado, marketplace o aplicación compleja con integraciones múltiples"
            },
            "price": "9500",
            "priceCurrency": "EUR"
          }
        ]
      }
    }
    </script>
